<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShieldCore LA — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f6f7f9;color:#1a1d26;min-height:100vh}
h1,h2,h3{font-family:'Plus Jakarta Sans',sans-serif}

.topbar{background:#fff;border-bottom:1px solid #e2e5eb;padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.topbar .logo{display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:1.1rem;text-decoration:none;color:#1a1d26}
.topbar .logo-box{width:28px;height:28px;border-radius:6px;background:#0066ff;display:flex;align-items:center;justify-content:center}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px)}
.login-box{background:#fff;border:1px solid #e2e5eb;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.login-box h2{text-align:center;margin-bottom:.3rem;font-size:1.3rem}
.login-box p{text-align:center;color:#8a8fa0;font-size:.85rem;margin-bottom:1.5rem}
.fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
.fg label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#8a8fa0}
.fg input{background:#f6f7f9;border:1px solid #e2e5eb;border-radius:10px;padding:.65rem .8rem;font-family:inherit;font-size:.85rem;outline:none}
.fg input:focus{border-color:#0066ff}
.btn{width:100%;padding:.7rem;border-radius:10px;background:#0066ff;color:#fff;border:none;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.btn:hover{background:#0052cc}
.err{color:#ef4444;font-size:.8rem;text-align:center;margin-top:.5rem;display:none}

/* Dashboard */
.dash{display:none;padding:1.5rem;max-width:1000px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.dash-header h2{font-size:1.4rem}
.logout{padding:.4rem 1rem;border-radius:8px;background:#ef4444;color:#fff;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:.82rem}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.5rem}
.stat{background:#fff;border:1px solid #e2e5eb;border-radius:12px;padding:1rem;text-align:center}
.stat .num{font-size:1.8rem;font-weight:800;color:#0066ff}
.stat .lbl{font-size:.75rem;color:#8a8fa0;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

.sub-card{background:#fff;border:1px solid #e2e5eb;border-radius:12px;padding:1.2rem;margin-bottom:.8rem;transition:all .2s}
.sub-card:hover{border-color:#0066ff;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.sub-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;flex-wrap:wrap;gap:.3rem}
.sub-name{font-weight:700;font-size:1rem}
.sub-date{font-size:.72rem;color:#8a8fa0}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem .8rem;font-size:.84rem}
.sub-grid .lbl{color:#8a8fa0;font-size:.72rem;font-weight:600;text-transform:uppercase}
.sub-grid .val{margin-bottom:.3rem}
.sub-grid .val a{color:#0066ff}
.sub-details{margin-top:.5rem;padding-top:.5rem;border-top:1px solid #f0f1f4;font-size:.84rem;color:#5c6070}
.sub-actions{display:flex;gap:.4rem;margin-top:.6rem}
.sub-actions button{padding:.3rem .7rem;border-radius:6px;border:1px solid #e2e5eb;background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit}
.sub-actions button:hover{border-color:#0066ff;color:#0066ff}
.sub-actions .del{color:#ef4444;border-color:#fecaca}
.sub-actions .del:hover{background:#fef2f2;border-color:#ef4444}

.empty{text-align:center;padding:3rem;color:#8a8fa0}
.empty span{font-size:2rem;display:block;margin-bottom:.5rem}
</style>
</head>
<body>

<div class="topbar">
  <a href="./" class="logo"><div class="logo-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="14" height="14"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>ShieldCore LA</a>
  <span style="font-size:.85rem;font-weight:600;color:#8a8fa0">Admin Panel</span>
</div>

<!-- Login Screen -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <h2>🔒 Admin Login</h2>
    <p>Sign in to view contact submissions</p>
    <div class="fg">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="err" id="loginErr">Invalid email or password</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dash" id="dashboard">
  <div class="dash-header">
    <h2>📋 Contact Submissions</h2>
    <div style="display:flex;gap:.5rem">
      <button class="logout" style="background:#0066ff" onclick="exportCSV()">📥 Export CSV</button>
      <button class="logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Total Requests</div></div>
    <div class="stat"><div class="num" id="statToday">0</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="num" id="statWeek">0</div><div class="lbl">This Week</div></div>
  </div>
  <div id="subList"></div>
</div>

<script>
// Admin accounts - passwords are hashed at login time, never stored in plain text
const ADMINS = [
  {email: 'owenkentyu@gmail.com', pass: 'Bridgeport1!'},
  {email: 'alexjschendel@gmail.com', pass: 'Carlthorp'}
];

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const hash = await sha256(pass);

  let valid = false;
  for (const admin of ADMINS) {
    const correctHash = await sha256(admin.pass);
    if (email === admin.email && hash === correctHash) { valid = true; break; }
  }

  if (valid) {
    sessionStorage.setItem('sc_auth', 'true');
    showDash();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    setTimeout(() => document.getElementById('loginErr').style.display = 'none', 3000);
  }
}

function doLogout() {
  sessionStorage.removeItem('sc_auth');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function showDash() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderSubs();
}

function renderSubs() {
  const subs = JSON.parse(localStorage.getItem('sc_submissions') || '[]').reverse();
  const el = document.getElementById('subList');

  // Stats
  document.getElementById('statTotal').textContent = subs.length;
  const today = new Date().toLocaleDateString();
  document.getElementById('statToday').textContent = subs.filter(s => new Date(s.date).toLocaleDateString() === today).length;
  const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  document.getElementById('statWeek').textContent = subs.filter(s => new Date(s.date).getTime() > weekAgo).length;

  if (subs.length === 0) {
    el.innerHTML = '<div class="empty"><span>📭</span>No submissions yet.<br>They\'ll appear here when someone fills out the contact form.</div>';
    return;
  }

  el.innerHTML = subs.map((s, i) => `
    <div class="sub-card">
      <div class="sub-top">
        <span class="sub-name">${s.name}</span>
        <span class="sub-date">${s.date}</span>
      </div>
      <div class="sub-grid">
        <div><div class="lbl">Email</div><div class="val"><a href="mailto:${s.email}">${s.email}</a></div></div>
        <div><div class="lbl">Phone</div><div class="val"><a href="tel:${s.phone}">${s.phone}</a></div></div>
        <div><div class="lbl">Property</div><div class="val">${s.property || '—'}</div></div>
        <div><div class="lbl">Service</div><div class="val">${s.service || '—'}</div></div>
        <div><div class="lbl">Location</div><div class="val">${s.location || '—'}</div></div>
      </div>
      ${s.details ? '<div class="sub-details"><strong>Details:</strong> ' + s.details + '</div>' : ''}
      <div class="sub-actions">
        <button onclick="window.open('mailto:${s.email}?subject=Re: ShieldCore LA Install&body=Hi ${s.name.split(' ')[0]},%0A%0AThanks for reaching out!')">📧 Reply</button>
        <button onclick="window.open('tel:${s.phone}')">📞 Call</button>
        <button class="del" onclick="deleteSub(${subs.length - 1 - i})">🗑 Delete</button>
      </div>
    </div>
  `).join('');
}

function deleteSub(idx) {
  if (!confirm('Delete this submission?')) return;
  const subs = JSON.parse(localStorage.getItem('sc_submissions') || '[]');
  subs.splice(idx, 1);
  localStorage.setItem('sc_submissions', JSON.stringify(subs));
  renderSubs();
}

function exportCSV() {
  const subs = JSON.parse(localStorage.getItem('sc_submissions') || '[]');
  if (!subs.length) { alert('No submissions to export.'); return; }
  const headers = 'Name,Email,Phone,Property,Service,Location,Details,Date\n';
  const rows = subs.map(s =>
    [s.name, s.email, s.phone, s.property, s.service, s.location, '"'+(s.details||'').replace(/"/g,'""')+'"', s.date].join(',')
  ).join('\n');
  const blob = new Blob([headers + rows], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shieldcore-submissions.csv';
  a.click();
}

// Auto-login if session active
if (sessionStorage.getItem('sc_auth') === 'true') showDash();
</script>
</body>
</html>
